<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Master Control</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; margin-bottom: 30px; font-size: 14px; }
        th, td { border: 1px solid #e2e8f0; padding: 10px; text-align: left; }
        th { background-color: #2b6cb0; color: white; }
        .btn-approve { background: #38a169; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; margin-right: 5px; }
        .btn-reject { background: #e53e3e; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>🛠 Admin Control Panel</h2>

    <h3 style="color: #e53e3e;">💸 Pending Withdraw Requests</h3>
    <table>
        <thead><tr><th>Email</th><th>Amount</th><th>TRC20 Address</th><th>Action</th></tr></thead>
        <tbody id="withdraws-table"></tbody>
    </table>

    <h3 style="color: #d69e2e;">📥 Pending Deposit Requests</h3>
    <table>
        <thead><tr><th>Email</th><th>Amount</th><th>TXID Hash</th><th>Action</th></tr></thead>
        <tbody id="deposits-table"></tbody>
    </table>
    
    <h3>👥 All Users</h3>
    <table>
        <thead><tr><th>Name/Email</th><th>Balance</th><th>Has Deposited?</th></tr></thead>
        <tbody id="users-table"></tbody>
    </table>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyAr_-bAoiQUjA1X0PDGflDAgQNngUD-1eY",
      authDomain: "crypto-invest-59692.firebaseapp.com",
      databaseURL: "https://crypto-invest-59692-default-rtdb.firebaseio.com",
      projectId: "crypto-invest-59692",
      storageBucket: "crypto-invest-59692.firebasestorage.app",
      messagingSenderId: "182027201348",
      appId: "1:182027201348:web:a17047b308f0129f4cc511"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Withdrawals
    db.ref('withdraw_requests').on('value', snap => {
        const table = document.getElementById("withdraws-table"); table.innerHTML = "";
        snap.forEach(child => {
            const data = child.val();
            if(data.status === "Pending") {
                table.innerHTML += `<tr><td>${data.email}</td><td><strong style="color:red;">${data.amount}</strong></td><td>${data.address}</td>
                <td><button class="btn-approve" onclick="db.ref('withdraw_requests/${child.key}').update({status:'Approved'})">Sent</button>
                <button class="btn-reject" onclick="rejectWithdraw('${child.key}', '${data.uid}', ${data.amount})">Reject</button></td></tr>`;
            }
        });
    });

    function rejectWithdraw(reqId, uid, amount) {
        db.ref('users/' + uid).once('value').then(snap => {
            db.ref('users/' + uid).update({ balance: (snap.val().balance || 0) + amount });
            db.ref('withdraw_requests/' + reqId).update({ status: "Rejected" });
        });
    }

    // Deposits
    db.ref('deposit_requests').on('value', snap => {
        const table = document.getElementById("deposits-table"); table.innerHTML = "";
        snap.forEach(child => {
            const data = child.val();
            if(data.status === "Pending") {
                table.innerHTML += `<tr><td>${data.email}</td><td><strong style="color:green;">${data.amount}</strong></td><td>${data.txid}</td>
                <td><button class="btn-approve" onclick="approveDeposit('${child.key}', '${data.uid}', ${data.amount})">Approve</button>
                <button class="btn-reject" onclick="db.ref('deposit_requests/${child.key}').update({status:'Rejected'})">Reject</button></td></tr>`;
            }
        });
    });

    // APPROVE DEPOSIT (Unlocks Withdrawals)
    function approveDeposit(reqId, uid, amount) {
        db.ref('users/' + uid).once('value').then((snap) => {
            let bal = snap.val().balance || 0;
            // Update balance & unlock withdrawal (hasDeposited: true)
            db.ref('users/' + uid).update({ balance: bal + amount, hasDeposited: true });
            db.ref('deposit_requests/' + reqId).update({ status: "Approved" });
        });
    }

    // All Users
    db.ref('users').on('value', snap => {
        const table = document.getElementById("users-table"); table.innerHTML = "";
        snap.forEach(child => {
            const data = child.val();
            table.innerHTML += `<tr><td>${data.email}</td><td>${parseFloat(data.balance||0).toFixed(2)} USDT</td><td>${data.hasDeposited ? '✅ Yes' : '❌ No'}</td></tr>`;
        });
    });
</script>
</body>
</html>
